<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impro Timeline</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 12px;
      background: #202020;
      color: #fff;
      font-family: sans-serif;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .toolbar label { font-size: 18px; font-weight: 700; }
    .toolbar select {
      background: #2d2d2d;
      color: #fff;
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      font-size: 18px;
      min-height: 44px;
      padding: 6px 10px;
      min-width: 220px;
    }
    .font-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }
    .font-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .font-control label {
      font-size: 14px;
      font-weight: 600;
    }
    .font-control input {
      width: 68px;
      min-height: 34px;
      background: #2d2d2d;
      color: #fff;
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 14px;
    }
    #canvas {
      display: block;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: #303030;
    }
  </style>
</head>
<body>
<div class="toolbar">
  <label for="songSelect">Song:</label>
  <select id="songSelect"></select>
  <div class="font-controls">
    <div class="font-control">
      <label for="statusFontSize">Info</label>
      <input id="statusFontSize" type="number" min="10" max="36" step="1"/>
    </div>
    <div class="font-control">
      <label for="overviewFontSize">Übersicht</label>
      <input id="overviewFontSize" type="number" min="10" max="36" step="1"/>
    </div>
    <div class="font-control">
      <label for="cardFontSize">Karten</label>
      <input id="cardFontSize" type="number" min="10" max="36" step="1"/>
    </div>
    <div class="font-control">
      <label for="trackLabelFontSize">Spuren</label>
      <input id="trackLabelFontSize" type="number" min="10" max="36" step="1"/>
    </div>
  </div>
</div>
<canvas id="canvas" width="1200" height="620"></canvas>

<script>
const TICKS_PER_BEAT = 24;
const TRACK_GAP = 14;
const LEFT_MARGIN = 150;
const RIGHT_MARGIN = 40;
const PLAYHEAD_FRACTION = 1 / 4;
const OVERVIEW_TOP = 90;
const OVERVIEW_HEIGHT = 10;
const OVERVIEW_LEFT_MARGIN = 50;
const OVERVIEW_RIGHT_MARGIN = 50;
const MARGIN_COLOR = '#303030';
const BACKGROUND_COLOR = '#202020';

const FONT_SETTING_KEY = 'improTimeline.fontSizes';
const FONT_DEFAULTS = {
  status: 18,
  overview: 13,
  card: 17,
  trackLabel: 18,
};

const TRACK_PADDING_TOP = 10;
const TRACK_PADDING_BOTTOM = 8;
const TRACK_MIN_HEIGHT = 56;

// Einstellbar: Wie viele Takte im sichtbaren Timeline-Ausschnitt gezeigt werden
const VISIBLE_WINDOW_MEASURES = 16;

const INSTRUCTION_CARD_WIDTH_PX = 320;
// Kleiner Abstand zwischen Karten, damit sie sich beim Schieben nicht überlagern
const CARD_GAP_PX = 10;

let canvas;
let ctx;
let songSelect;
let ws;

let availableSongs = [];
let selectedSongId = null;
let currentSong = null;
let processedSegments = [];
let trackDefs = [];
let currentTick = 0;
let lastSegmentIndex = -1;
let pixelsPerTick = 0.1;
const instructionCardOffsetsByTrack = {};
let fontSizes = { ...FONT_DEFAULTS };

function resetInstructionCardPositions() {
  for (const key of Object.keys(instructionCardOffsetsByTrack)) {
    delete instructionCardOffsetsByTrack[key];
  }
}

window.addEventListener('load', async () => {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  songSelect = document.getElementById('songSelect');
  initializeFontSizeControls();

  songSelect.addEventListener('change', () => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'selectSong', data: { songId: songSelect.value } }));
  });

  await loadSongs();
  connectWebSocket();
  requestAnimationFrame(render);
});

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function parseFontSizeValue(value, fallback) {
  const numericValue = Number.parseInt(value, 10);
  if (Number.isNaN(numericValue)) return fallback;
  return clamp(numericValue, 10, 36);
}

function setCanvasFont(size, weight = 'normal') {
  ctx.font = `${weight} ${size}px sans-serif`;
}

function getInstructionLineHeight() {
  return Math.ceil(fontSizes.card * 1.25);
}

function persistFontSizes() {
  localStorage.setItem(FONT_SETTING_KEY, JSON.stringify(fontSizes));
}

function loadFontSizes() {
  try {
    const saved = localStorage.getItem(FONT_SETTING_KEY);
    if (!saved) return;
    const parsed = JSON.parse(saved);
    if (!parsed || typeof parsed !== 'object') return;

    fontSizes = {
      status: parseFontSizeValue(parsed.status, FONT_DEFAULTS.status),
      overview: parseFontSizeValue(parsed.overview, FONT_DEFAULTS.overview),
      card: parseFontSizeValue(parsed.card, FONT_DEFAULTS.card),
      trackLabel: parseFontSizeValue(parsed.trackLabel, FONT_DEFAULTS.trackLabel),
    };
  } catch (_error) {
    fontSizes = { ...FONT_DEFAULTS };
  }
}

function initializeFontSizeControls() {
  loadFontSizes();

  const controls = [
    { id: 'statusFontSize', key: 'status' },
    { id: 'overviewFontSize', key: 'overview' },
    { id: 'cardFontSize', key: 'card' },
    { id: 'trackLabelFontSize', key: 'trackLabel' },
  ];

  for (const control of controls) {
    const input = document.getElementById(control.id);
    if (!input) continue;
    input.value = String(fontSizes[control.key]);
    input.addEventListener('input', () => {
      fontSizes[control.key] = parseFontSizeValue(input.value, FONT_DEFAULTS[control.key]);
      persistFontSizes();
    });
  }
}

async function loadSongs() {
  try {
    const response = await fetch('/api/songs');
    const data = await response.json();
    applyState(data);
  } catch (error) {
    console.error('Songs konnten nicht geladen werden:', error);
  }
}

function connectWebSocket() {
  const wsUrl = `ws://${window.location.hostname}:8080`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => console.log('WebSocket verbunden:', wsUrl);

  ws.onmessage = (event) => {
    try {
      handleWsMessage(JSON.parse(event.data));
      return;
    } catch (_ignored) {
      const fallbackTick = parseInt(String(event.data).trim().replace(';', ''), 10);
      if (!Number.isNaN(fallbackTick)) currentTick = fallbackTick;
    }
  };

  ws.onerror = (err) => console.error('WS-Fehler', err);
}

function handleWsMessage(msg) {
  if (msg.type === 'tick') {
    if (typeof msg.data?.tick === 'number') {
      const nextTick = msg.data.tick;
      if (nextTick === 0 && currentTick !== 0) {
        resetInstructionCardPositions();
        lastSegmentIndex = -1;
      }
      currentTick = nextTick;
    }
    return;
  }

  if (msg.type === 'state' || msg.type === 'songChanged') {
    applyState(msg.data);
  }
}

function applyState(data) {
  availableSongs = Array.isArray(data.songs) ? data.songs : [];
  selectedSongId = data.currentSongId || null;
  currentSong = data.currentSong || null;

  updateSongSelect();
  if (typeof data.latestTick === 'number') currentTick = data.latestTick;

  prepareSegments();
  lastSegmentIndex = -1;
}

function updateSongSelect() {
  const existingValue = songSelect.value;
  songSelect.innerHTML = '';
  for (const song of availableSongs) {
    const option = document.createElement('option');
    option.value = song.id;
    option.textContent = song.name;
    songSelect.appendChild(option);
  }
  songSelect.value = selectedSongId || existingValue;
}

function getMusicians() {
  const defaultMusicians = [
    { name: 'Gregor', backgroundColor: '#1f242f' },
    { name: 'Ali', backgroundColor: '#1f2f24' },
    { name: 'Frank', backgroundColor: '#2f241f' },
  ];

  if (!currentSong || !Array.isArray(currentSong.musicians) || currentSong.musicians.length === 0) {
    return defaultMusicians;
  }

  return currentSong.musicians
    .map((entry) => {
      if (typeof entry === 'string') {
        return { name: entry, backgroundColor: '#171717' };
      }

      if (entry && typeof entry === 'object' && typeof entry.name === 'string' && entry.name.trim() !== '') {
        return {
          name: entry.name,
          backgroundColor: entry.backgroundColor || '#171717',
        };
      }

      return null;
    })
    .filter(Boolean);
}

function getTrackDefs() {
  return getMusicians().map((musician) => ({
    label: musician.name,
    key: musician.name,
    backgroundColor: musician.backgroundColor,
  }));
}

function prepareSegments() {
  processedSegments = [];
  trackDefs = getTrackDefs();
  resetInstructionCardPositions();
  if (!currentSong || !Array.isArray(currentSong.segments)) return;

  let startTick = 0;
  let cumulativeStartMeasure = 0;

  for (let i = 0; i < currentSong.segments.length; i++) {
    const obj = currentSong.segments[i];
    const beatsPerMeasure = parseTimeSignatureBeats(obj.timeSignature);
    const segLenInTicks = obj.measures * beatsPerMeasure * TICKS_PER_BEAT;

    processedSegments.push({
      ...obj,
      name: obj.name || `Segment${i + 1}`,
      instructions: normalizeInstructions(obj.instructions),
      startTick,
      endTick: startTick + segLenInTicks,
      absoluteStartMeasure: cumulativeStartMeasure,
    });

    startTick += segLenInTicks;
    cumulativeStartMeasure += obj.measures;
  }
}

function normalizeInstructions(instructions) {
  const safe = instructions && typeof instructions === 'object' ? instructions : {};
  const normalized = { ...safe };

  if (Array.isArray(safe.all) && trackDefs.some((track) => track.key === 'Alle') && !Array.isArray(normalized.Alle)) {
    normalized.Alle = [...safe.all];
  }

  for (const trackDef of trackDefs) {
    if (!Array.isArray(normalized[trackDef.key])) normalized[trackDef.key] = [];
  }

  return normalized;
}

function getInstructionLines(segment, trackKey) {
  if (!segment || !segment.instructions) return [];
  const list = segment.instructions[trackKey];
  return Array.isArray(list) ? list : [];
}

function getTrackHeight(trackDef) {
  const lineHeight = getInstructionLineHeight();
  let maxLines = 1;
  for (const segment of processedSegments) {
    maxLines = Math.max(maxLines, getInstructionLines(segment, trackDef.key).length || 1);
  }
  return Math.max(TRACK_MIN_HEIGHT, TRACK_PADDING_TOP + TRACK_PADDING_BOTTOM + (maxLines * lineHeight));
}

function getCurrentBeatsPerMeasure() {
  const idx = getSegmentIndex(currentTick);
  if (idx >= 0) {
    return parseTimeSignatureBeats(processedSegments[idx].timeSignature);
  }
  return 4;
}

function updateHorizontalScale() {
  const timelineWidth = canvas.width - LEFT_MARGIN - RIGHT_MARGIN;
  const beatsPerMeasure = getCurrentBeatsPerMeasure();
  const visibleTicks = Math.max(1, VISIBLE_WINDOW_MEASURES * beatsPerMeasure * TICKS_PER_BEAT);
  pixelsPerTick = timelineWidth / visibleTicks;
}

function parseTimeSignatureBeats(ts) {
  const parts = String(ts || '').split('/');
  if (parts.length === 2) {
    const n = parseInt(parts[0], 10);
    if (!Number.isNaN(n)) return n;
  }
  return 4;
}

function computeElapsedTimeSec(upToTick) {
  let totalSec = 0;
  for (const s of processedSegments) {
    const ticksPerSec = (s.tempo * TICKS_PER_BEAT) / 60.0;
    if (upToTick >= s.endTick) {
      totalSec += (s.endTick - s.startTick) / ticksPerSec;
    } else if (upToTick >= s.startTick) {
      totalSec += (upToTick - s.startTick) / ticksPerSec;
      break;
    } else {
      break;
    }
  }
  return totalSec;
}

function getCurrentSegmentInfo(tick) {
  const info = { currentMeasure: 0, currentBeat: 0, currTimeSig: '', currTonart: '', currTempo: 120 };
  for (const s of processedSegments) {
    if (tick >= s.startTick && tick < s.endTick) {
      const localTicks = tick - s.startTick;
      const beatsPerMeasure = parseTimeSignatureBeats(s.timeSignature);
      const ticksPerMeasure = beatsPerMeasure * TICKS_PER_BEAT;
      const measureOffset = Math.floor(localTicks / ticksPerMeasure);
      const beatOffset = Math.floor((localTicks / TICKS_PER_BEAT) % beatsPerMeasure);

      info.currentMeasure = s.absoluteStartMeasure + measureOffset + 1;
      info.currentBeat = beatOffset + 1;
      info.currTimeSig = s.timeSignature;
      info.currTonart = s.tonart;
      info.currTempo = s.tempo;
      return info;
    }
  }
  return info;
}

function getSegmentIndex(tick) {
  for (let i = 0; i < processedSegments.length; i++) {
    const s = processedSegments[i];
    if (tick >= s.startTick && tick < s.endTick) return i;
  }
  return -1;
}

function getMaxTick() {
  if (processedSegments.length === 0) return 0;
  return processedSegments[processedSegments.length - 1].endTick;
}

function mapVal(value, inMin, inMax, outMin, outMax) {
  if (inMax === inMin) return outMin;
  return outMin + ((value - inMin) / (inMax - inMin)) * (outMax - outMin);
}

function tickToX(tick, scrollBaseTick) {
  return LEFT_MARGIN + (tick - scrollBaseTick) * pixelsPerTick;
}

function pad2(num) { return num < 10 ? `0${num}` : String(num); }

function render() {
  const trackHeights = trackDefs.map(getTrackHeight);
  const tracksHeight = trackHeights.reduce((acc, value) => acc + value, 0) + Math.max(0, (trackDefs.length - 1) * TRACK_GAP);
  const neededHeight = OVERVIEW_TOP + 60 + tracksHeight + 30;
  if (canvas.height !== neededHeight) {
    canvas.height = neededHeight;
  }

  ctx.fillStyle = BACKGROUND_COLOR;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const elapsedSec = computeElapsedTimeSec(currentTick);
  const mm = Math.floor(elapsedSec / 60);
  const ss = Math.floor(elapsedSec % 60);
  const timeStr = `${pad2(mm)}:${pad2(ss)}`;

  const info = getCurrentSegmentInfo(currentTick);
  const measureInfo = `Takt: ${info.currentMeasure}   Zählzeit: ${info.currentBeat}   Taktart: ${info.currTimeSig}   Tonart: ${info.currTonart}   Tempo: ${info.currTempo} BPM   Zeit: ${timeStr}   Fenster: ${VISIBLE_WINDOW_MEASURES} Takte`;
  ctx.fillStyle = '#fff';
  setCanvasFont(fontSizes.status);
  ctx.textAlign = 'left';
  ctx.fillText(measureInfo, 20, 24);

  drawOverviewTrack();
  updateHorizontalScale();

  const timelineWidth = canvas.width - LEFT_MARGIN - RIGHT_MARGIN;
  const playheadX = LEFT_MARGIN + timelineWidth * PLAYHEAD_FRACTION;
  const scrollBaseTick = currentTick - (playheadX - LEFT_MARGIN) / pixelsPerTick;

  let nextY = OVERVIEW_TOP + 40;
  drawMeasureGrid(scrollBaseTick, nextY, nextY + tracksHeight);

  const currentSegmentIndex = getSegmentIndex(currentTick);

  for (let i = 0; i < trackDefs.length; i++) {
    const trackDef = trackDefs[i];
    const trackHeight = trackHeights[i];
    drawInstructionTrack(scrollBaseTick, nextY, trackHeight, trackDef, playheadX, currentSegmentIndex);
    coverLeftRightMarginArea(nextY, nextY + trackHeight);
    drawTrackLabel(trackDef.label, 20, nextY + trackHeight / 2);
    nextY += trackHeight + TRACK_GAP;
  }

  drawPlayhead(playheadX);

  if (currentSegmentIndex >= 0 && currentSegmentIndex !== lastSegmentIndex) {
    notifySegmentChange(processedSegments[currentSegmentIndex]);
    lastSegmentIndex = currentSegmentIndex;
  }

  requestAnimationFrame(render);
}

function notifySegmentChange(segment) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    type: 'segmentChange',
    data: {
      name: segment.name,
      tempo: segment.tempo,
      tonart: segment.tonart,
      timeSignature: segment.timeSignature,
      instructions: segment.instructions,
    },
  }));
}

function drawInstructionTrack(scrollBaseTick, trackY, trackHeight, trackDef, playheadX, currentSegmentIndex) {
  const lineHeight = getInstructionLineHeight();
  const cardLayouts = getInstructionCardLayouts(trackDef.key, scrollBaseTick, playheadX, currentSegmentIndex);

  for (let i = 0; i < processedSegments.length; i++) {
    const s = processedSegments[i];
    const sx = tickToX(s.startTick, scrollBaseTick);
    const ex = tickToX(s.endTick, scrollBaseTick);
    if (ex < LEFT_MARGIN || sx > canvas.width - RIGHT_MARGIN) continue;

    ctx.fillStyle = trackDef.backgroundColor || '#171717';
    ctx.fillRect(sx, trackY, ex - sx, trackHeight);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, trackY, ex - sx, trackHeight);

    const lines = getInstructionLines(s, trackDef.key);
    if (lines.length === 0) continue;

    const layout = cardLayouts[i];
    if (!layout) continue;

    const cardX = layout.x;
    const cardMaxWidth = Math.max(80, Math.min(INSTRUCTION_CARD_WIDTH_PX, ex - sx - 14));
    const cardHeight = Math.min(trackHeight - 8, TRACK_PADDING_TOP + TRACK_PADDING_BOTTOM + lines.length * lineHeight);
    const cardY = trackY + 4;

    ctx.fillStyle = '#101010';
    ctx.fillRect(cardX, cardY, cardMaxWidth, cardHeight);
    ctx.strokeStyle = '#8a8a8a';
    ctx.lineWidth = 1;
    ctx.strokeRect(cardX, cardY, cardMaxWidth, cardHeight);

    ctx.fillStyle = '#f3f3f3';
    setCanvasFont(fontSizes.card);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
      const textY = cardY + TRACK_PADDING_TOP + (lineIndex * lineHeight);
      ctx.fillText(`• ${lines[lineIndex]}`, cardX + 8, textY, Math.max(40, cardMaxWidth - 16));
    }
  }
}

function getInstructionCardLayouts(trackKey, scrollBaseTick, playheadX, currentSegmentIndex) {
  const holdX = playheadX + 6;
  const offsets = instructionCardOffsetsByTrack[trackKey] || {};
  const entries = [];

  for (let i = 0; i < processedSegments.length; i++) {
    const segment = processedSegments[i];
    const lines = getInstructionLines(segment, trackKey);
    if (lines.length === 0) continue;

    const normalX = tickToX(segment.startTick, scrollBaseTick) + 8;
    const segmentWidth = Math.max(80, Math.min(INSTRUCTION_CARD_WIDTH_PX, tickToX(segment.endTick, scrollBaseTick) - tickToX(segment.startTick, scrollBaseTick) - 14));
    const offset = offsets[i] || 0;
    let x = normalX + offset;

    if (i >= currentSegmentIndex && currentSegmentIndex >= 0) {
      x = Math.max(x, holdX);
    }

    entries.push({ index: i, x, normalX, width: segmentWidth });
  }

  for (let idx = entries.length - 2; idx >= 0; idx--) {
    const leftCard = entries[idx];
    const rightCard = entries[idx + 1];
    const maxAllowedX = rightCard.x - leftCard.width - CARD_GAP_PX;
    if (leftCard.x > maxAllowedX) {
      leftCard.x = maxAllowedX;
    }
  }

  for (const entry of entries) {
    offsets[entry.index] = entry.x - entry.normalX;
  }
  instructionCardOffsetsByTrack[trackKey] = offsets;

  const layoutBySegmentIndex = {};
  for (const entry of entries) {
    layoutBySegmentIndex[entry.index] = { x: entry.x };
  }
  return layoutBySegmentIndex;
}

function drawOverviewTrack() {
  const overviewWidth = canvas.width - OVERVIEW_LEFT_MARGIN - OVERVIEW_RIGHT_MARGIN;
  const maxTick = getMaxTick();
  const yCenter = OVERVIEW_TOP + OVERVIEW_HEIGHT / 2;

  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(OVERVIEW_LEFT_MARGIN, yCenter);
  ctx.lineTo(OVERVIEW_LEFT_MARGIN + overviewWidth, yCenter);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  setCanvasFont(fontSizes.overview);
  ctx.fillStyle = '#fff';

  for (const s of processedSegments) {
    const xLine = mapVal(s.startTick, 0, maxTick || 1, OVERVIEW_LEFT_MARGIN, OVERVIEW_LEFT_MARGIN + overviewWidth);
    ctx.strokeStyle = 'rgb(120,120,120)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xLine, OVERVIEW_TOP);
    ctx.lineTo(xLine, OVERVIEW_TOP + OVERVIEW_HEIGHT);
    ctx.stroke();
    ctx.fillText(s.name, xLine, OVERVIEW_TOP - 3);
  }

  const xCursor = mapVal(currentTick, 0, maxTick || 1, OVERVIEW_LEFT_MARGIN, OVERVIEW_LEFT_MARGIN + overviewWidth);
  ctx.strokeStyle = 'red';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(xCursor, OVERVIEW_TOP - 5);
  ctx.lineTo(xCursor, OVERVIEW_TOP + OVERVIEW_HEIGHT + 5);
  ctx.stroke();
}

function drawMeasureGrid(scrollBaseTick, topY, bottomY) {
  ctx.strokeStyle = 'rgb(80,80,80)';
  ctx.lineWidth = 1;
  for (const s of processedSegments) {
    const beatsPerMeasure = parseTimeSignatureBeats(s.timeSignature);
    for (let m = 0; m <= s.measures; m++) {
      const measureTick = s.startTick + m * beatsPerMeasure * TICKS_PER_BEAT;
      const xLine = tickToX(measureTick, scrollBaseTick);
      if (xLine >= LEFT_MARGIN && xLine <= canvas.width - RIGHT_MARGIN) {
        ctx.beginPath();
        ctx.moveTo(xLine, topY);
        ctx.lineTo(xLine, bottomY);
        ctx.stroke();
      }
    }
  }
}

function coverLeftRightMarginArea(topY, bottomY) {
  ctx.fillStyle = MARGIN_COLOR;
  const h = bottomY - topY;
  ctx.fillRect(0, topY, LEFT_MARGIN, h);
  ctx.fillRect(canvas.width - RIGHT_MARGIN, topY, RIGHT_MARGIN, h);
}

function drawTrackLabel(label, x, y) {
  ctx.fillStyle = '#d8d8d8';
  setCanvasFont(fontSizes.trackLabel);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
}

function drawPlayhead(playheadX) {
  ctx.strokeStyle = 'red';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(playheadX, OVERVIEW_TOP + 35);
  ctx.lineTo(playheadX, canvas.height - 20);
  ctx.stroke();
}
</script>
</body>
</html>
